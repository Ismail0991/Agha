<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Staff</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>.ic{width:1.05em;height:1.05em;display:inline-block;vertical-align:-0.15em;flex-shrink:0}</style>
  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#dc2626">
  <link rel="apple-touch-icon" href="/static/icons/icon-180.png">
  <link rel="icon" type="image/png" href="/static/icons/favicon-32.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aghaz">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- Top Branding Bar -->
  <header class="bg-gradient-to-r from-red-600 to-red-500 text-white shadow-md">
    <div class="max-w-5xl mx-auto flex items-center justify-between px-6 py-4">
      <h1 class="text-xl md:text-2xl font-bold tracking-wide"><svg class="ic"><use href="/static/icons/sprite.svg#ic-clipboard"></use></svg> Staff Management</h1>
      <a href="{{ url_for('index') }}" 
         class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg shadow transition text-sm font-medium">
        <svg class="ic"><use href="/static/icons/sprite.svg#ic-arrow-left"></use></svg> Back to Dashboard
      </a>
    </div>
  </header>

  <!-- Form Container -->
  <main class="flex-1 flex items-center justify-center p-6">
    <div class="bg-white shadow-2xl rounded-2xl w-full max-w-2xl p-8 border border-gray-100 relative overflow-hidden">

      <!-- Decorative Circle Background -->
      <div class="absolute -top-10 -right-10 w-40 h-40 bg-red-100 rounded-full opacity-30"></div>
      <div class="absolute -bottom-12 -left-12 w-56 h-56 bg-red-50 rounded-full opacity-40"></div>

      <h2 class="text-2xl font-bold text-red-600 mb-6 flex items-center relative z-10">
        <svg class="ic"><use href="/static/icons/sprite.svg#ic-edit"></use></svg> Edit Staff
      </h2>

      <!-- enctype added for file upload -->
      <form method="POST" enctype="multipart/form-data" class="grid grid-cols-1 gap-5 relative z-10">
        
        <!-- Name -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-user"></use></svg> Name</label>
          <input type="text" name="name" maxlength="25" pattern="[A-Za-z ]+" 
                 value="{{ internee.name }}"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required>
        </div>

        <!-- Father Name -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-user"></use></svg> Father Name</label>
          <input type="text" name="father" maxlength="25" pattern="[A-Za-z ]+" 
                 value="{{ internee.father }}"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required>
        </div>

        <!-- Gender -->
<div>
  <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-users"></use></svg> Gender</label>
  <select name="gender" required
          class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
    <option value="">-- Select Gender --</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
  </select>
</div>


        <!-- CNIC -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-id"></use></svg> CNIC</label>
          <input type="text" name="cnic" maxlength="15" 
                 value="{{ internee.cnic }}" 
                 oninput="formatCNIC(this)"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required>
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-phone"></use></svg> Phone</label>
          <input type="text" name="phone" pattern="[0-9]+" 
                 value="{{ internee.phone }}" 
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-mail"></use></svg> Email</label>
          <input type="email" name="email" value="{{ internee.email or '' }}" placeholder="Email address"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
        </div>

        <!-- Emergency Contact -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-alert"></use></svg> Emergency Contact</label>
          <input type="text" name="emergency_contact" value="{{ internee.emergency_contact or '' }}" placeholder="Emergency contact number"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
        </div>

        <!-- Department -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-briefcase"></use></svg> Department</label>
          <select name="field" required
                  class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
            <option value="">-- Select Department --</option>
            {% for dept in departments %}
            <option value="{{ dept }}" {% if internee.field == dept %}selected{% endif %}>{{ dept }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Start Date -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-calendar"></use></svg> Start Date</label>
          <input type="date" name="start" 
                 value="{{ internee.start }}" 
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required>
        </div>

        <!-- End Date -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-calendar"></use></svg> End Date</label>
          <input type="date" name="end" 
                 value="{{ internee.end }}" 
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required>
        </div>

        <!-- Reset Login Password -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-key"></use></svg> Login Password</label>
          <input type="text" name="password" placeholder="Leave blank to keep current password"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
          <p class="text-xs text-gray-400 mt-1">Set or reset this employee's portal password. Leave blank to keep unchanged.</p>
        </div>

        <!-- Profile Image -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-image"></use></svg> Profile Image</label>
          {% if internee.image %}
            <img src="{{ internee.image }}" 
                 alt="{{ internee.name }}" 
                 class="w-20 h-20 rounded-full object-cover border shadow">
          {% else %}
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" 
                 alt="No Image" 
                 class="w-20 h-20 rounded-full object-cover border shadow">
          {% endif %}
          <input type="file" name="image" accept="image/*"
                 class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
        </div>

        <!-- CNIC Images (front + back) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-id"></use></svg> CNIC Front
              {% if internee.cnic_front %}<a href="{{ internee.cnic_front }}" target="_blank" class="text-blue-600 text-xs hover:underline ml-1">(view)</a>{% endif %}
            </label>
            <input type="file" name="cnic_front" accept="image/*"
                   class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-id"></use></svg> CNIC Back
              {% if internee.cnic_back %}<a href="{{ internee.cnic_back }}" target="_blank" class="text-blue-600 text-xs hover:underline ml-1">(view)</a>{% endif %}
            </label>
            <input type="file" name="cnic_back" accept="image/*"
                   class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
          </div>
        </div>

        <!-- Resume -->
        <div>
          <label class="block text-gray-700 font-medium mb-1"><svg class="ic"><use href="/static/icons/sprite.svg#ic-file"></use></svg> Resume (PDF / DOC)
            {% if internee.resume %}<a href="{{ internee.resume }}" target="_blank" class="text-blue-600 text-xs hover:underline ml-1">(view current)</a>{% endif %}
          </label>
          <input type="file" name="resume" accept=".pdf,.doc,.docx"
                 class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
        </div>

        <!-- Buttons -->
        <div class="flex space-x-3 mt-6">
          <button type="submit" 
                  class="flex-1 bg-red-600 text-white py-2.5 rounded-lg hover:bg-red-700 transition font-medium shadow-md">
            <svg class="ic"><use href="/static/icons/sprite.svg#ic-save"></use></svg> Save Changes
          </button>
          <a href="{{ url_for('index') }}" 
             class="flex-1 text-center bg-gray-300 text-gray-800 py-2.5 rounded-lg hover:bg-gray-400 transition font-medium shadow-md">
            <svg class="ic"><use href="/static/icons/sprite.svg#ic-x"></use></svg> Cancel
          </a>
        </div>
      </form>
    </div>
  </main>

<script>
  // CNIC auto-formatting: XXXXX-XXXXXXX-X
  function formatCNIC(input) {
    let value = input.value.replace(/[^0-9]/g, "");
    if (value.length > 5 && value.length <= 12) {
      input.value = value.slice(0,5) + "-" + value.slice(5);
    } else if (value.length > 12) {
      input.value = value.slice(0,5) + "-" + value.slice(5,12) + "-" + value.slice(12,13);
    } else {
      input.value = value;
    }
  }
</script>

  <script src="{{ url_for('static', filename='ui.js') }}"></script>
</body>
</html>
